apiVersion: apps/v1
kind: Deployment
metadata:
  name: bigfiles-toolbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bigfiles-toolbox
  template:
    metadata:
      labels:
        app: bigfiles-toolbox
    spec:
      containers:
        - name: toolbox
          image: ubuntu:24.04
          command: ["/bin/bash", "-lc", "--"]
          args:
            - |
              set -e
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                coreutils util-linux e2fsprogs fio \
              && rm -rf /var/lib/apt/lists/*
              echo "Ready. Write big files under /data (ephemeral emptyDir)."
              df -h /data || true
              sleep infinity
          # Optional but recommended: tell Kubernetes how much ephemeral storage you expect to use.
          # This helps scheduling and prevents surprising evictions.
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
      #        ephemeral-storage: "10Gi"
            limits:
              cpu: "1"
              memory: "1Gi"
       #       ephemeral-storage: "100Gi"
